name: e2e release gate

# Run as a status check on the upstream genealogy repo's `release/*` PRs.
# Triggered manually via workflow_dispatch (with the backend image tag) and
# from the upstream repo via repository_dispatch (CI hand-off).

on:
  workflow_dispatch:
    inputs:
      backend_image:
        description: "Backend image tag (e.g. ghcr.io/vadim-am/genealogy-backend:test-abc123)"
        required: true
        type: string
      pr_number:
        description: "Upstream PR number for status reporting (optional)"
        required: false
        type: string

  repository_dispatch:
    types: [run-e2e]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
      statuses: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve inputs
        id: inputs
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "backend_image=${{ github.event.inputs.backend_image }}" >> "$GITHUB_OUTPUT"
            echo "pr_number=${{ github.event.inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "backend_image=${{ github.event.client_payload.backend_image }}" >> "$GITHUB_OUTPUT"
            echo "pr_number=${{ github.event.client_payload.pr_number }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.event.client_payload.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run suite
        env:
          BACKEND_IMAGE: ${{ steps.inputs.outputs.backend_image }}
        run: |
          docker compose up --build --abort-on-container-exit \
            --exit-code-from e2e e2e

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Report status to upstream PR
        if: always() && steps.inputs.outputs.head_sha != ''
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_PAT }}
        run: |
          STATE="success"
          if [[ "${{ job.status }}" != "success" ]]; then STATE="failure"; fi
          gh api -X POST \
            "repos/Vadim-AM/Genealogy/statuses/${{ steps.inputs.outputs.head_sha }}" \
            -f state="$STATE" \
            -f context="genealogy-e2e/release-gate" \
            -f description="Browser e2e suite (${{ github.run_id }})" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            || echo "(status report skipped — UPSTREAM_PAT secret not set)"
